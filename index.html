<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CommBadge">
  <meta name="description" content="IPM's CommBadge — two-way video call">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>IPM's CommBadge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* LCARS colour palette */
      --black:   #000000;
      --orange:  #FF9900;
      --orange2: #FFCC66;
      --amber:   #FF7700;
      --tan:     #FFCC99;
      --blue:    #9999FF;
      --blue2:   #6666CC;
      --red:     #CC4444;
      --red2:    #FF6666;
      --green:   #33CC33;
      --purple:  #CC99CC;
      --text:    #FF9900;
      --text2:   #FFCC99;
      --muted:   #996633;
      --panel:   #111111;

      --antonio: 'Antonio', sans-serif;
      --mono:    'Share Tech Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--text);
      font-family: var(--antonio);
      font-size: 15px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ── LCARS Frame ── */
    .lcars-frame {
      display: flex;
      flex-direction: column;
      flex: 1;
      padding: 0 0 8px 0;
    }

    /* Top bar */
    .lcars-top {
      display: flex;
      align-items: stretch;
      height: 64px;
      margin-bottom: 4px;
      flex-shrink: 0;
    }

    .lcars-top-elbow {
      width: 80px;
      background: var(--orange);
      border-radius: 32px 0 0 0;
      flex-shrink: 0;
    }

    .lcars-top-title {
      flex: 1;
      background: var(--black);
      border-top: 8px solid var(--orange);
      display: flex;
      align-items: flex-start;
      padding: 4px 16px 0;
    }

    .lcars-title-text {
      font-family: var(--antonio);
      font-size: 28px;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      line-height: 1;
    }

    .lcars-title-sub {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.2em;
      margin-top: 2px;
    }

    .lcars-top-right {
      width: 120px;
      background: var(--orange);
      border-radius: 0 32px 0 0;
      flex-shrink: 0;
    }

    /* Body layout */
    .lcars-body {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* Left sidebar */
    .lcars-sidebar {
      width: 40px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-bottom: 40px;
    }

    .sidebar-block {
      border-radius: 0 0 0 20px;
      flex-shrink: 0;
    }

    .sb-orange  { background: var(--orange);  height: 80px; }
    .sb-blue    { background: var(--blue);    height: 50px; }
    .sb-tan     { background: var(--tan);     height: 120px; }
    .sb-purple  { background: var(--purple);  height: 40px; }
    .sb-amber   { background: var(--amber);   height: 200px; }
    .sb-blue2   { background: var(--blue2);   flex: 1; min-height: 30px; }

    /* Content area */
    .lcars-content {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Bottom bar */
    .lcars-bottom {
      display: flex;
      align-items: stretch;
      height: 40px;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .lcars-bottom-elbow {
      width: 80px;
      background: var(--blue2);
      border-radius: 0 0 0 20px;
      flex-shrink: 0;
    }

    .lcars-bottom-bar {
      flex: 1;
      background: var(--blue2);
      border-radius: 0 0 20px 0;
    }

    /* ── LCARS Panels ── */
    .lcars-panel {
      background: var(--panel);
      border: 1px solid rgba(255,153,0,0.15);
      border-left: 4px solid var(--orange);
      border-radius: 0 8px 8px 0;
      padding: 12px 14px;
    }

    .lcars-panel.blue-accent  { border-left-color: var(--blue); }
    .lcars-panel.tan-accent   { border-left-color: var(--tan); }
    .lcars-panel.red-accent   { border-left-color: var(--red2); }
    .lcars-panel.purple-accent{ border-left-color: var(--purple); }

    .panel-label {
      font-family: var(--antonio);
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* ── Status bar ── */
    .lcars-status {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 1px solid rgba(255,153,0,0.15);
      border-radius: 0 20px 20px 0;
      padding: 6px 16px 6px 12px;
      border-left: 4px solid var(--orange2);
    }

    .stream-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .stream-dot.live        { background: var(--red2); box-shadow: 0 0 8px var(--red2); animation: lcars-pulse 1.2s infinite; }
    .stream-dot.watching    { background: var(--green); }
    .stream-dot.connecting  { background: var(--orange2); }

    @keyframes lcars-pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .status-text {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--orange2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      flex: 1;
    }

    #stream-quality {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* ── Camera selector ── */
    .cam-row { display: flex; gap: 6px; margin-bottom: 12px; }

    .lcars-cam-btn {
      flex: 1;
      padding: 8px;
      border: 2px solid var(--muted);
      border-radius: 20px;
      background: transparent;
      color: var(--muted);
      font-family: var(--antonio);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .lcars-cam-btn.active {
      border-color: var(--orange);
      color: var(--orange);
      background: rgba(255,153,0,0.08);
    }

    /* ── Quality sliders ── */
    .quality-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .quality-label {
      font-family: var(--antonio);
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      width: 72px;
      flex-shrink: 0;
      text-align: right;
    }
    .quality-val {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--orange2);
      width: 76px;
      flex-shrink: 0;
    }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: rgba(255,153,0,0.2);
      border-radius: 999px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--orange);
      border: 2px solid var(--black);
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--orange);
      border: 2px solid var(--black);
      cursor: pointer;
    }

    /* ── LCARS Buttons ── */
    .lcars-btn {
      width: 100%;
      padding: 12px 20px;
      border-radius: 20px;
      font-family: var(--antonio);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      border: none;
      margin-bottom: 6px;
      text-align: center;
    }
    .lcars-btn:last-child { margin-bottom: 0; }
    .lcars-btn:active { transform: scale(0.98); }
    .lcars-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .lcars-btn.orange  { background: var(--orange);  color: var(--black); }
    .lcars-btn.blue    { background: var(--blue);    color: var(--black); }
    .lcars-btn.tan     { background: var(--tan);     color: var(--black); }
    .lcars-btn.red     { background: var(--red2);    color: var(--black); }
    .lcars-btn.amber   { background: var(--amber);   color: var(--black); }
    .lcars-btn.purple  { background: var(--purple);  color: var(--black); }
    .lcars-btn.grey    { background: #444;           color: var(--orange2); }

    .lcars-btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .lcars-btn-row .lcars-btn { margin-bottom: 0; }

    /* ── Video ── */
    .call-video-wrap {
      position: relative;
      background: #000;
      border-radius: 4px;
      overflow: hidden;
      aspect-ratio: 16/9;
      border: 2px solid var(--orange);
    }
    .call-video-wrap video#remote-video {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .call-video-wrap video#local-video {
      position: absolute;
      bottom: 8px; right: 8px;
      width: 26%; aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 4px;
      border: 2px solid var(--orange);
      background: #111;
      z-index: 2;
    }
    .call-video-wrap .no-stream {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Scanline overlay for LCARS feel */
    .call-video-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
      pointer-events: none;
      z-index: 3;
    }

    /* ── Chat ── */
    .chat-messages {
      min-height: 90px;
      max-height: 160px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-bottom: 4px;
    }
    .chat-msg {
      max-width: 85%;
      padding: 6px 12px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
      word-break: break-word;
      letter-spacing: 0.05em;
    }
    .chat-msg.sent {
      align-self: flex-end;
      background: rgba(255,153,0,0.15);
      border: 1px solid var(--orange);
      border-radius: 12px 12px 0 12px;
      color: var(--orange2);
    }
    .chat-msg.received {
      align-self: flex-start;
      background: rgba(153,153,255,0.12);
      border: 1px solid var(--blue2);
      border-radius: 12px 12px 12px 0;
      color: var(--blue);
    }
    .chat-msg .msg-time {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 0.08em;
    }
    .chat-empty {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding: 1rem 0;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .chat-input-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,153,0,0.2);
    }
    .chat-input {
      flex: 1;
      background: rgba(255,153,0,0.05);
      border: 1px solid rgba(255,153,0,0.3);
      border-radius: 20px;
      color: var(--orange2);
      font-family: var(--mono);
      font-size: 13px;
      padding: 8px 14px;
      outline: none;
      transition: border-color 0.15s;
      letter-spacing: 0.05em;
    }
    .chat-input:focus { border-color: var(--orange); }
    .chat-input::placeholder { color: var(--muted); }
    .chat-send {
      background: var(--blue2);
      border: none;
      border-radius: 20px;
      color: var(--black);
      font-family: var(--antonio);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 8px 16px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .chat-send:hover { opacity: 0.85; }
    .chat-send:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Busy screen ── */
    .busy-screen {
      text-align: center;
      padding: 2rem 1rem;
    }
    .busy-icon { font-size: 40px; margin-bottom: 10px; }
    .busy-text {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.1em;
      line-height: 1.8;
      text-transform: uppercase;
    }

    /* ── Divider ── */
    .lcars-divider {
      height: 3px;
      background: linear-gradient(to right, var(--orange), var(--blue2), transparent);
      border-radius: 999px;
      margin: 2px 0;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: calc(1.5rem + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--panel);
      border: 2px solid var(--orange);
      border-radius: 20px;
      padding: 8px 20px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--orange2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 400;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="lcars-frame">

  <!-- Top bar -->
  <div class="lcars-top">
    <div class="lcars-top-elbow"></div>
    <div class="lcars-top-title">
      <div>
        <div class="lcars-title-text">CommBadge</div>
        <div class="lcars-title-sub">IPM COMMUNICATIONS SYSTEM — ACTIVE</div>
      </div>
    </div>
    <div class="lcars-top-right"></div>
  </div>

  <!-- Body -->
  <div class="lcars-body">

    <!-- Left sidebar -->
    <div class="lcars-sidebar">
      <div class="sidebar-block sb-orange"></div>
      <div class="sidebar-block sb-blue"></div>
      <div class="sidebar-block sb-tan"></div>
      <div class="sidebar-block sb-purple"></div>
      <div class="sidebar-block sb-amber"></div>
      <div class="sidebar-block sb-blue2"></div>
    </div>

    <!-- Content -->
    <div class="lcars-content">

      <!-- Status -->
      <div class="lcars-status">
        <span class="stream-dot" id="stream-dot"></span>
        <span class="status-text" id="stream-status-text">SYSTEM READY</span>
        <span id="stream-quality"></span>
      </div>

      <!-- Idle screen -->
      <div id="card-idle">
        <div class="lcars-panel">
          <div class="panel-label">Input Device</div>
          <div class="cam-row">
            <button class="lcars-cam-btn active" id="cam-rear"  onclick="selectCamera('rear')">&#9654; Rear</button>
            <button class="lcars-cam-btn"        id="cam-front" onclick="selectCamera('front')">&#9654; Front</button>
          </div>
          <div class="panel-label">Transmission Quality</div>
          <div class="quality-row">
            <span class="quality-label">Resolution</span>
            <input type="range" id="sl-res" min="0" max="3" step="1" value="1" oninput="updateSliders()">
            <span class="quality-val" id="lbl-res">480×360</span>
          </div>
          <div class="quality-row">
            <span class="quality-label">Frame Rate</span>
            <input type="range" id="sl-fps" min="0" max="4" step="1" value="1" oninput="updateSliders()">
            <span class="quality-val" id="lbl-fps">15 FPS</span>
          </div>
          <div class="quality-row" style="margin-bottom:0">
            <span class="quality-label">Bitrate</span>
            <input type="range" id="sl-bps" min="0" max="4" step="1" value="2" oninput="updateSliders()">
            <span class="quality-val" id="lbl-bps">400 KBPS</span>
          </div>
        </div>
        <div style="height:10px"></div>
        <button class="lcars-btn orange" id="btn-start" onclick="startCall()">&#9679; Initiate Channel</button>
      </div>

      <!-- Busy screen -->
      <div id="card-busy" style="display:none">
        <div class="lcars-panel red-accent">
          <div class="busy-screen">
            <div class="busy-icon">📵</div>
            <div class="busy-text">Channel in use.<br>Please stand by.</div>
          </div>
        </div>
      </div>

      <!-- Active call video -->
      <div id="card-video" style="display:none">
        <div class="call-video-wrap">
          <video id="remote-video" autoplay playsinline></video>
          <video id="local-video"  autoplay muted playsinline></video>
          <div class="no-stream" id="no-stream-msg">Awaiting connection…</div>
        </div>
      </div>

      <!-- Active call controls + chat -->
      <div id="card-controls" style="display:none">
        <div class="lcars-panel blue-accent">
          <div class="lcars-btn-row">
            <button class="lcars-btn amber" id="btn-mute" onclick="toggleMute()">Mute</button>
            <button class="lcars-btn tan"   id="btn-cam"  onclick="toggleCamera()">Hide Cam</button>
          </div>
          <button class="lcars-btn red" onclick="stopStream()">&#9632; Close Channel</button>
        </div>
        <div style="height:8px"></div>
        <div class="lcars-panel purple-accent">
          <div class="panel-label">Comm Channel</div>
          <div class="chat-messages" id="chat-messages">
            <div class="chat-empty" id="chat-empty">— No transmissions —</div>
          </div>
          <div class="chat-input-row">
            <input type="text" class="chat-input" id="chat-input" placeholder="Transmit message…" onkeydown="chatKeydown(event)" maxlength="500">
            <button class="chat-send" id="chat-send" onclick="sendChatMessage()" disabled>Send</button>
          </div>
        </div>
      </div>

      <div class="lcars-divider"></div>

    </div>
  </div>

  <!-- Bottom bar -->
  <div class="lcars-bottom">
    <div class="lcars-bottom-elbow"></div>
    <div class="lcars-bottom-bar"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────
// Signalling uses a dedicated Supabase project, separate from the main
// MurDough Matrix database, keeping primary data credentials private.
// ROADMAP: Evaluate further credential management options as the app scales.
const SB_URL    = 'https://qxxxlpdbfzlsgqnffqsg.supabase.co';
const SB_KEY    = 'sb_publishable_6oiKJUELnMY6Q6OAtExsiw_gi3uZ_I9';
const STREAM_CH = 'commbadge-stream';

const RTC_CONFIG = { iceServers: [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' },
  { urls: 'turn:openrelay.metered.ca:80',   username:'openrelayproject', credential:'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443',  username:'openrelayproject', credential:'openrelayproject' },
  { urls: 'turns:openrelay.metered.ca:443', username:'openrelayproject', credential:'openrelayproject' },
]};

// ── Quality options ───────────────────────────────────────────
const RES_OPTIONS = [
  { label:'320×240',  w:320,  h:240  },
  { label:'480×360',  w:480,  h:360  },
  { label:'640×480',  w:640,  h:480  },
  { label:'1280×720', w:1280, h:720  },
];
const FPS_OPTIONS = [8, 15, 24, 30, 60];
const BPS_OPTIONS = [
  { label:'100 KBPS', bps:100000  },
  { label:'200 KBPS', bps:200000  },
  { label:'400 KBPS', bps:400000  },
  { label:'800 KBPS', bps:800000  },
  { label:'1.5 MBPS', bps:1500000 },
];

function getQualitySettings() {
  const ri=parseInt(localStorage.getItem('cb_sl_res')?? '1');
  const fi=parseInt(localStorage.getItem('cb_sl_fps')?? '1');
  const bi=parseInt(localStorage.getItem('cb_sl_bps')?? '2');
  return { res:RES_OPTIONS[Math.min(ri,3)], fps:FPS_OPTIONS[Math.min(fi,4)], bps:BPS_OPTIONS[Math.min(bi,4)] };
}

function updateSliders() {
  const ri=parseInt(getEl('sl-res').value), fi=parseInt(getEl('sl-fps').value), bi=parseInt(getEl('sl-bps').value);
  getEl('lbl-res').textContent = RES_OPTIONS[ri].label;
  getEl('lbl-fps').textContent = FPS_OPTIONS[fi]+' FPS';
  getEl('lbl-bps').textContent = BPS_OPTIONS[bi].label;
  localStorage.setItem('cb_sl_res',ri); localStorage.setItem('cb_sl_fps',fi); localStorage.setItem('cb_sl_bps',bi);
}

function initSliders() {
  const ri=parseInt(localStorage.getItem('cb_sl_res')??'1'), fi=parseInt(localStorage.getItem('cb_sl_fps')??'1'), bi=parseInt(localStorage.getItem('cb_sl_bps')??'2');
  getEl('sl-res').value=ri; getEl('sl-fps').value=fi; getEl('sl-bps').value=bi;
  updateSliders();
}

// ── State ─────────────────────────────────────────────────────
let supabaseClient=null, rtcChannel=null, peerConnection=null, localStream=null;
let inCall=false, isInitiator=false, isMuted=false, isCamHidden=false;
let dataChannel=null, pendingCandidates=[], remoteDescSet=false, negotiating=false;
let adaptiveTimer=null, keyframeTimer=null, lastPacketsLost=0, lastPacketsSent=0, currentMaxBitrate=200000;
let reconnectTimer=null, reconnectAttempts=0;
let selectedCamera='rear';

// ── Helpers ───────────────────────────────────────────────────
const getEl = id => document.getElementById(id);
const pad   = n  => String(n).padStart(2,'0');

function nowTs() {
  const d=new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
function fmt12time(tsStr) {
  const [hh,mm]=tsStr.split(' ')[1].split(':'); const h=parseInt(hh);
  return `${h%12||12}:${mm}${h>=12?'pm':'am'}`;
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function vibrate()  { if(navigator.vibrate) navigator.vibrate(40); }

function showToast(msg) {
  const t=getEl('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function setStreamStatus(state, msg) {
  const dot=getEl('stream-dot');
  dot.className='stream-dot'+(state==='live'?' live':state==='watching'?' watching':state==='connecting'?' connecting':'');
  getEl('stream-status-text').textContent=msg.toUpperCase();
}

// ── Camera ────────────────────────────────────────────────────
function selectCamera(facing) {
  selectedCamera=facing;
  getEl('cam-rear').classList.toggle('active',facing==='rear');
  getEl('cam-front').classList.toggle('active',facing==='front');
}

async function getLocalStream() {
  const {res,fps}=getQualitySettings();
  return await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:selectedCamera==='rear'?'environment':'user', width:{ideal:res.w,max:res.w}, height:{ideal:res.h,max:res.h}, frameRate:{ideal:fps,max:fps} },
    audio:{
      echoCancellation:true,
      noiseSuppression:true,
      autoGainControl:true,
      googNoiseSuppression:true,
      googHighpassFilter:true,
      sampleRate:16000
    }
  });
}

// ── Supabase ──────────────────────────────────────────────────
function initSB() { if(!supabaseClient) supabaseClient=window.supabase.createClient(SB_URL,SB_KEY); }

async function sbFetch(path, opts={}) {
  const res=await fetch(SB_URL+'/rest/v1/'+path,{
    ...opts, headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':opts.prefer||'',...(opts.headers||{})}
  });
  if(!res.ok) throw new Error(await res.text());
  const text=await res.text(); return text?JSON.parse(text):null;
}

async function setSessionActive(active) {
  try {
    const rows=await sbFetch('stream_session?order=id.asc&limit=1');
    if(rows&&rows.length) await sbFetch(`stream_session?id=eq.${rows[0].id}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({active,updated_at:new Date().toISOString()})});
  } catch(err){}
}

async function checkSessionActive() {
  try {
    const rows=await sbFetch('stream_session?order=id.asc&limit=1');
    return rows&&rows.length&&rows[0].active===true;
  } catch(err){return false;}
}

// ── SDP ───────────────────────────────────────────────────────
function constrainSDP(sdp) {
  const lines=sdp.split('\r\n'); let vp8=null;
  for(const l of lines){const m=l.match(/a=rtpmap:(\d+) VP8\/90000/);if(m){vp8=m[1];break;}}
  let result=sdp;
  if(vp8) result=result.replace(/m=video (\d+) [A-Z/]+ ([\d ]+)/,(match,port,pays)=>`m=video ${port} UDP/TLS/RTP/SAVPF ${vp8} ${pays.split(' ').filter(p=>p!==vp8).join(' ')}`);
  const kbps=Math.round(getQualitySettings().bps.bps/1000);
  result=result.replace(/(m=video [^\r\n]+\r\n)/g,`$1b=AS:${kbps}\r\n`);
  return result;
}

async function applyBitrateLimit(pc) {
  const {bps,fps}=getQualitySettings(); currentMaxBitrate=bps.bps;
  for(const sender of pc.getSenders()){
    if(!sender.track) continue;
    try{
      const params=sender.getParameters();
      if(!params.encodings?.length) params.encodings=[{}];
      if(sender.track.kind==='video'){params.encodings[0].maxBitrate=bps.bps;params.encodings[0].maxFramerate=fps;}
      await sender.setParameters(params);
    }catch(e){}
  }
  startAdaptiveBitrate(pc); startKeyframeInterval(pc);
}

// ── Adaptive bitrate ──────────────────────────────────────────
function startAdaptiveBitrate(pc) {
  if(adaptiveTimer) clearInterval(adaptiveTimer);
  adaptiveTimer=setInterval(async()=>{
    if(!pc||pc.connectionState!=='connected') return;
    try{
      const stats=await pc.getStats(); let lost=0,sent=0,rtt=0;
      stats.forEach(r=>{
        if(r.type==='outbound-rtp'&&r.kind==='video') sent=r.packetsSent||0;
        if(r.type==='remote-inbound-rtp'&&r.kind==='video'){lost=r.packetsLost||0;rtt=r.roundTripTime||0;}
      });
      const ld=lost-lastPacketsLost,sd=sent-lastPacketsSent;
      lastPacketsLost=lost;lastPacketsSent=sent;
      const lr=sd>0?ld/sd:0;
      let nb=currentMaxBitrate;
      if(lr>0.05||rtt>0.3){nb=Math.max(50000,Math.floor(currentMaxBitrate*0.75));updateQualityIndicator('poor');}
      else if(lr<0.01&&rtt<0.15){const ceil=getQualitySettings().bps.bps;nb=Math.min(ceil,Math.floor(currentMaxBitrate*1.1));updateQualityIndicator('good');}
      else updateQualityIndicator(lr<0.03?'good':'fair');
      if(nb!==currentMaxBitrate){
        currentMaxBitrate=nb;
        for(const sender of pc.getSenders()){
          if(!sender.track||sender.track.kind!=='video') continue;
          try{const p=sender.getParameters();if(!p.encodings?.length)p.encodings=[{}];p.encodings[0].maxBitrate=nb;await sender.setParameters(p);}catch(e){}
        }
      }
    }catch(err){}
  },3000);
}

function stopAdaptiveBitrate() {
  if(adaptiveTimer){clearInterval(adaptiveTimer);adaptiveTimer=null;}
  if(keyframeTimer){clearInterval(keyframeTimer);keyframeTimer=null;}
  currentMaxBitrate=200000;lastPacketsLost=0;lastPacketsSent=0;
}

function startKeyframeInterval(pc) {
  if(keyframeTimer) clearInterval(keyframeTimer);
  keyframeTimer=setInterval(async()=>{
    if(!pc||pc.connectionState!=='connected') return;
    for(const sender of pc.getSenders()){
      if(sender.track?.kind==='video'&&sender.generateKeyFrame){try{await sender.generateKeyFrame();}catch(e){}}
    }
  },2000);
}

function updateQualityIndicator(level) {
  const el=getEl('stream-quality');if(!el) return;
  const map={good:{text:'SIG: GOOD',color:'#33CC33'},fair:{text:'SIG: FAIR',color:'#FF9900'},poor:{text:'SIG: POOR',color:'#CC4444'}};
  const q=map[level]||map.good;el.textContent=q.text;el.style.color=q.color;
  el.style.fontFamily="'Share Tech Mono', monospace";el.style.fontSize='11px';
}

// ── Signalling ────────────────────────────────────────────────
function setupChannel() {
  initSB();
  if(rtcChannel){rtcChannel.unsubscribe();rtcChannel=null;}
  rtcChannel=supabaseClient.channel(STREAM_CH,{config:{broadcast:{self:false}}});

  rtcChannel.on('broadcast',{event:'answer'},async({payload})=>{
    if(!inCall||!isInitiator||!peerConnection) return;
    try{
      await peerConnection.setRemoteDescription(new RTCSessionDescription(payload.sdp));
      remoteDescSet=true;
      for(const c of pendingCandidates){try{await peerConnection.addIceCandidate(new RTCIceCandidate(c));}catch(e){}}
      pendingCandidates=[];
    }catch(err){}
  });

  rtcChannel.on('broadcast',{event:'offer'},async({payload})=>{
    if(!inCall||isInitiator||negotiating) return;
    negotiating=true;remoteDescSet=false;pendingCandidates=[];
    setStreamStatus('connecting','Establishing channel…');
    if(peerConnection){peerConnection.close();peerConnection=null;}
    await createPC(false);
    await peerConnection.setRemoteDescription(new RTCSessionDescription(payload.sdp));
    remoteDescSet=true;
    for(const c of pendingCandidates){try{await peerConnection.addIceCandidate(new RTCIceCandidate(c));}catch(e){}}
    pendingCandidates=[];
    const answer=await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    rtcChannel.send({type:'broadcast',event:'answer',payload:{sdp:answer}});
  });

  rtcChannel.on('broadcast',{event:'ice-candidate'},async({payload})=>{
    if(!peerConnection) return;
    if(!remoteDescSet) pendingCandidates.push(payload.candidate);
    else{try{await peerConnection.addIceCandidate(new RTCIceCandidate(payload.candidate));}catch(e){}}
  });

  rtcChannel.on('broadcast',{event:'call-ended'},()=>{
    if(inCall){cleanup();setStreamStatus('','Channel closed');showToast('Channel closed');}
  });

  rtcChannel.on('broadcast',{event:'responder-ready'},async()=>{
    if(!inCall||!isInitiator||!peerConnection) return;
    await sendOffer(); setStreamStatus('connecting','Establishing channel…');
  });

  return new Promise(resolve=>{rtcChannel.subscribe(status=>{if(status==='SUBSCRIBED')resolve();});});
}

async function createPC(initiator) {
  peerConnection=new RTCPeerConnection(RTC_CONFIG);
  window._debugPC=peerConnection;

  peerConnection.onicecandidate=({candidate})=>{
    if(candidate&&rtcChannel) rtcChannel.send({type:'broadcast',event:'ice-candidate',payload:{candidate}});
  };

  peerConnection.onconnectionstatechange=()=>{
    const state=peerConnection?.connectionState;
    if(state==='connected'){
      negotiating=false;
      setStreamStatus('live','Channel open');
      applyBitrateLimit(peerConnection);
      getEl('no-stream-msg').style.display='none';
      vibrate();
    } else if(state==='disconnected'){
      setStreamStatus('connecting','Reconnecting…');
      tryIceRestart(peerConnection);
    } else if(state==='failed'){
      autoReconnect();
    }
  };

  peerConnection.ontrack=({streams})=>{
    const rv=getEl('remote-video');rv.srcObject=streams[0];rv.play().catch(()=>{});
    getEl('no-stream-msg').style.display='none';
  };

  if(localStream) localStream.getTracks().forEach(track=>peerConnection.addTrack(track,localStream));

  if(initiator){
    dataChannel=peerConnection.createDataChannel('chat',{ordered:true});
    setupDataChannel(dataChannel);
  } else {
    peerConnection.ondatachannel=({channel})=>{dataChannel=channel;setupDataChannel(dataChannel);};
  }
}

async function sendOffer() {
  if(!peerConnection||!inCall) return;
  remoteDescSet=false;pendingCandidates=[];
  const offer=await peerConnection.createOffer();
  const constrained={type:offer.type,sdp:constrainSDP(offer.sdp)};
  await peerConnection.setLocalDescription(constrained);
  rtcChannel.send({type:'broadcast',event:'offer',payload:{sdp:constrained}});
}

// ── ICE restart ───────────────────────────────────────────────
async function tryIceRestart(pc) {
  if(!pc||!rtcChannel) return;
  try{
    const offer=await pc.createOffer({iceRestart:true});
    const constrained={type:offer.type,sdp:constrainSDP(offer.sdp)};
    await pc.setLocalDescription(constrained);
    rtcChannel.send({type:'broadcast',event:'offer',payload:{sdp:constrained}});
  }catch(err){autoReconnect();}
}

function autoReconnect() {
  if(!inCall||reconnectAttempts>=5){cleanup();setStreamStatus('','Channel lost');reconnectAttempts=0;return;}
  reconnectAttempts++;
  const delay=Math.min(2000*reconnectAttempts,10000);
  setStreamStatus('connecting',`Reconnecting ${reconnectAttempts}/5…`);
  reconnectTimer=setTimeout(async()=>{
    if(!inCall) return;
    if(peerConnection){peerConnection.close();peerConnection=null;}
    remoteDescSet=false;pendingCandidates=[];negotiating=false;
    await createPC(isInitiator);
    if(isInitiator) await sendOffer();
    else if(rtcChannel) rtcChannel.send({type:'broadcast',event:'responder-ready',payload:{}});
  },delay);
}

// ── Chat ──────────────────────────────────────────────────────
function setupDataChannel(dc) {
  dc.onopen=()=>{getEl('chat-send').disabled=false;getEl('chat-input').placeholder='Transmit message…';};
  dc.onclose=()=>{getEl('chat-send').disabled=true;};
  dc.onmessage=({data})=>{try{const msg=JSON.parse(data);appendChat(msg.text,false,msg.time);}catch(e){}};
}

function appendChat(text,sent,time) {
  const container=getEl('chat-messages');
  const empty=getEl('chat-empty');if(empty)empty.remove();
  const div=document.createElement('div');
  div.className='chat-msg '+(sent?'sent':'received');
  div.innerHTML=`${escHtml(text)}<div class="msg-time">${time}</div>`;
  container.appendChild(div);
  container.scrollTop=container.scrollHeight;
}

function sendChatMessage() {
  const input=getEl('chat-input');
  const text=input.value.trim();if(!text||!dataChannel||dataChannel.readyState!=='open') return;
  const time=fmt12time(nowTs());
  dataChannel.send(JSON.stringify({text,time}));
  appendChat(text,true,time);
  input.value='';
}

function chatKeydown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChatMessage();}}

// ── Call flow ─────────────────────────────────────────────────
async function startCall() {
  const busy=await checkSessionActive();
  if(busy){showBusy();return;}
  try{localStream=await getLocalStream();}
  catch(err){showToast('Camera/mic access denied');return;}
  inCall=true;isInitiator=true;isMuted=false;isCamHidden=false;
  remoteDescSet=false;pendingCandidates=[];negotiating=false;
  const lv=getEl('local-video');lv.srcObject=localStream;lv.play().catch(()=>{});
  showCallUI();setStreamStatus('connecting','Awaiting response…');
  await setSessionActive(true);
  await setupChannel();
  await createPC(true);
}

async function joinCall() {
  try{localStream=await getLocalStream();}
  catch(err){showToast('Camera/mic access denied');return;}
  inCall=true;isInitiator=false;isMuted=false;isCamHidden=false;
  remoteDescSet=false;pendingCandidates=[];negotiating=false;
  const lv=getEl('local-video');lv.srcObject=localStream;lv.play().catch(()=>{});
  showCallUI();setStreamStatus('connecting','Opening channel…');
  await setupChannel();
  await createPC(false);
  rtcChannel.send({type:'broadcast',event:'responder-ready',payload:{}});
}

function stopStream() {
  if(inCall&&rtcChannel) rtcChannel.send({type:'broadcast',event:'call-ended',payload:{}});
  if(inCall) setSessionActive(false);
  cleanup();setStreamStatus('','Channel closed');
}

function cleanup() {
  inCall=false;isInitiator=false;negotiating=false;
  remoteDescSet=false;pendingCandidates=[];
  stopAdaptiveBitrate();
  if(reconnectTimer){clearTimeout(reconnectTimer);reconnectTimer=null;}
  reconnectAttempts=0;
  if(dataChannel){dataChannel.close();dataChannel=null;}
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  if(peerConnection){peerConnection.close();peerConnection=null;}
  if(rtcChannel){rtcChannel.unsubscribe();rtcChannel=null;}
  isMuted=false;isCamHidden=false;
  const lv=getEl('local-video'),rv=getEl('remote-video');
  lv.srcObject=null;lv.style.opacity='1';rv.srcObject=null;
  getEl('no-stream-msg').style.display='flex';
  const chatCont=getEl('chat-messages');
  if(chatCont) chatCont.innerHTML='<div class="chat-empty" id="chat-empty">— No transmissions —</div>';
  getEl('chat-send').disabled=true;
  const bm=getEl('btn-mute'),bc=getEl('btn-cam');
  if(bm){bm.textContent='Mute';bm.style.background='';}
  if(bc){bc.textContent='Hide Cam';bc.style.background='';}
  updateQualityIndicator('good');
  showIdleUI();
}

function toggleMute() {
  if(!localStream) return;
  const track=localStream.getAudioTracks()[0];if(!track) return;
  isMuted=!isMuted;track.enabled=!isMuted;
  const btn=getEl('btn-mute');
  btn.textContent=isMuted?'Unmute':'Mute';
  btn.style.background=isMuted?'var(--muted)':'';
}

function toggleCamera() {
  if(!localStream) return;
  const track=localStream.getVideoTracks()[0];if(!track) return;
  isCamHidden=!isCamHidden;track.enabled=!isCamHidden;
  const btn=getEl('btn-cam');
  btn.textContent=isCamHidden?'Show Cam':'Hide Cam';
  btn.style.background=isCamHidden?'var(--muted)':'';
  getEl('local-video').style.opacity=isCamHidden?'0.15':'1';
}

// ── UI screens ────────────────────────────────────────────────
function showIdleUI() {
  getEl('card-idle').style.display='block';
  getEl('card-busy').style.display='none';
  getEl('card-video').style.display='none';
  getEl('card-controls').style.display='none';
  const btn=getEl('btn-start');
  btn.textContent='⬤ Initiate Channel';
  btn.className='lcars-btn orange';
  btn.onclick=startCall;
}

function showBusy() {
  getEl('card-idle').style.display='none';
  getEl('card-busy').style.display='block';
  getEl('card-video').style.display='none';
  getEl('card-controls').style.display='none';
  setStreamStatus('','Channel in use');
}

function showJoinOption() {
  getEl('card-idle').style.display='block';
  getEl('card-busy').style.display='none';
  getEl('card-video').style.display='none';
  getEl('card-controls').style.display='none';
  const btn=getEl('btn-start');
  btn.textContent='📡 Open Channel';
  btn.className='lcars-btn blue';
  btn.onclick=joinCall;
  setStreamStatus('live','Channel active — open to join');
}

function showCallUI() {
  getEl('card-idle').style.display='none';
  getEl('card-busy').style.display='none';
  getEl('card-video').style.display='block';
  getEl('card-controls').style.display='block';
}

// ── Poll presence ─────────────────────────────────────────────
async function pollPresence() {
  if(inCall) return;
  const active=await checkSessionActive();
  if(active) showJoinOption();
  else showIdleUI();
}

// ── Init ──────────────────────────────────────────────────────
function init() { initSliders(); initSB(); pollPresence(); }
setInterval(pollPresence,15000);
init();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
